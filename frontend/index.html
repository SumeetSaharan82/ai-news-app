<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🤖 AI News App</h1>
            <div class="auth-buttons">
                <button id="loginBtn" class="btn btn-secondary">Login</button>
                <button id="registerBtn" class="btn btn-primary">Register</button>
                <button id="profileBtn" class="btn btn-secondary hidden">Profile</button>
                <button id="logoutBtn" class="btn btn-secondary hidden">Logout</button>
            </div>
        </header>

        <!-- Welcome Section (shown when not logged in) -->
        <section id="welcomeSection" class="welcome-section">
            <h2>Welcome to AI News App</h2>
            <p>Get personalized news powered by AI</p>
            <p>Please login or register to get started</p>
        </section>

        <!-- Preference Selection Modal (shown on first login) -->
        <div id="preferenceModal" class="modal hidden">
            <div class="modal-content preference-content">
                <span class="close">&times;</span>
                <h2>🎯 Select Your Preferences</h2>
                <p>Choose your preferred news categories and region</p>
                
                <div class="form-group">
                    <label>Select Categories (at least one):</label>
                    <div id="preferenceCategoryGrid" class="category-grid"></div>
                </div>
                
                <div class="form-group">
                    <label>Select Region:</label>
                    <div id="preferenceRegionGrid" class="region-grid"></div>
                </div>
                
                <button id="savePreferencesBtn" class="btn btn-primary">Save Preferences</button>
            </div>
        </div>

        <!-- Profile Modal (shown when user clicks Profile) -->
        <div id="profileModal" class="modal hidden">
            <div class="modal-content preference-content">
                <span class="close">&times;</span>
                <h2>👤 Your Profile</h2>
                <div id="profileInfo" class="profile-info"></div>
                
                <div class="form-group">
                    <label>Update Categories:</label>
                    <div id="profileCategoryGrid" class="category-grid"></div>
                </div>
                
                <div class="form-group">
                    <label>Update Region:</label>
                    <div id="profileRegionGrid" class="region-grid"></div>
                </div>
                
                <button id="updatePreferencesBtn" class="btn btn-primary">Update Preferences</button>
            </div>
        </div>

        <!-- News Display (shown after preferences are set) -->
        <section id="newsSection" class="news-section hidden">
            <div class="news-header">
                <h2 id="newsTitle">Latest News</h2>
                <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
            </div>
            <div id="newsContainer" class="news-container">
                <!-- Category sections will be dynamically loaded here -->
            </div>
            <div id="loadingSpinner" class="loading-spinner hidden">
                <div class="spinner"></div>
                <p>Loading news...</p>
            </div>
            <div id="errorMessage" class="error-message hidden"></div>
        </section>

        <!-- Analysis Section -->
        <section id="analysisSection" class="analysis-section hidden">
            <h2>📊 News Analysis</h2>
            <div class="analysis-controls">
                <button id="trendsBtn" class="btn btn-secondary">View Trends</button>
                <button id="keywordsBtn" class="btn btn-secondary">Trending Keywords</button>
            </div>
            <div id="analysisResults" class="analysis-results"></div>
        </section>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="authModalTitle">Login</h2>
            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group hidden" id="nameGroup">
                    <label for="name">Name:</label>
                    <input type="text" id="name">
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
